listening-port=3478
listening-ip=0.0.0.0

# For production behind NAT, replace with your public IP mapping:
# external-ip=<PUBLIC_IP>/<PRIVATE_IP>

fingerprint
realm=avatar.local

use-auth-secret
static-auth-secret=turn-shared-secret

# Keep TURN lean for media relay only.
no-cli
no-multicast-peers
no-tls
no-dtls

min-port=49160
max-port=49200

# Logging
simple-log
