networks:
  avatar-net:
    driver: bridge

services:
  redis:
    image: redis:7.2-alpine
    container_name: avatar-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - avatar-net

  coturn:
    image: coturn/coturn:4.6.3
    container_name: avatar-coturn
    restart: unless-stopped
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - avatar-net
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

  # Pin patch version: >=1.16.2 fixes RTSP publish 400 when a reader polls /in concurrently (#5095).
  mediamtx:
    build:
      context: ./mediamtx
      dockerfile: Dockerfile
    image: avatar-mediamtx:1.17.1
    container_name: avatar-mediamtx
    restart: unless-stopped
    command: ["/mediamtx.yml"]
    depends_on:
      - coturn
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - avatar-net
    ports:
      - "8554:8554/tcp"
      - "8889:8889/tcp"
      - "8189:8189/udp"
      - "8189:8189/tcp"
      - "9997:9997/tcp"
      - "9998:9998/tcp"

  session-api:
    build:
      context: ./session-api
    container_name: avatar-session-api
    restart: unless-stopped
    depends_on:
      - redis
      - mediamtx
    networks:
      - avatar-net
    environment:
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_WEBRTC_BASE_URL: ${MEDIAMTX_WEBRTC_BASE_URL:-http://localhost:8889}
      MEDIAMTX_RTSP_BASE_URL: rtsp://mediamtx:8554
      WHIP_USERNAME: ${WHIP_USERNAME:-publisher}
      WHIP_PASSWORD: ${WHIP_PASSWORD:-publisher-pass}
      WHEP_USERNAME: ${WHEP_USERNAME:-viewer}
      WHEP_PASSWORD: ${WHEP_PASSWORD:-viewer-pass}
      WORKER_RTSP_USER: ${WORKER_RTSP_USER:-worker}
      WORKER_RTSP_PASS: ${WORKER_RTSP_PASS:-worker-pass}
      START_QUEUE: avatar:sessions:start
      STOP_QUEUE: avatar:sessions:stop
    ports:
      - "8080:8080"

  soulx-worker:
    build:
      context: ./worker
    container_name: avatar-soulx-worker
    restart: unless-stopped
    depends_on:
      - redis
      - mediamtx
    networks:
      - avatar-net
    environment:
      REDIS_URL: redis://redis:6379/0
      START_QUEUE: avatar:sessions:start
      STOP_QUEUE: avatar:sessions:stop
      WORKER_MODE: ${WORKER_MODE:-passthrough}
      WORKER_RTSP_USER: ${WORKER_RTSP_USER:-worker}
      WORKER_RTSP_PASS: ${WORKER_RTSP_PASS:-worker-pass}
      MEDIAMTX_HOST: mediamtx
      MEDIAMTX_RTSP_PORT: "8554"
      MEDIAMTX_CONTROL_API_BASE: http://mediamtx:9997
      MEDIAMTX_API_USER: api
      MEDIAMTX_API_PASS: api-pass
      WAIT_PUBLISHER_TIMEOUT_S: "300"
      WAIT_PUBLISHER_NO_PUBLISHER_RETRY_S: "15"
      # SoulX-FlashHead: use Dockerfile.soulx + GPU + model mounts; set to 0 to run inference.
      SOULX_DRY_RUN: "1"

volumes:
  redis-data:
