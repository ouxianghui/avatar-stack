networks:
  avatar-net:
    driver: bridge

services:
  redis:
    image: redis:7.2-alpine
    container_name: avatar-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - avatar-net

  coturn:
    image: coturn/coturn:4.6.3
    container_name: avatar-coturn
    restart: unless-stopped
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - avatar-net
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

  # Pin patch version: >=1.16.2 fixes RTSP publish 400 when a reader polls /in concurrently (#5095).
  mediamtx:
    build:
      context: ./mediamtx
      dockerfile: Dockerfile
      args:
        MEDIAMTX_IMAGE: ${MEDIAMTX_IMAGE:-bluenviron/mediamtx:1.17.1-ffmpeg}
    image: avatar-mediamtx:1.17.1
    container_name: avatar-mediamtx
    restart: unless-stopped
    command: ["/mediamtx.yml"]
    depends_on:
      - coturn
      - session-api
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - avatar-net
    ports:
      - "8554:8554/tcp"
      - "8889:8889/tcp"
      - "8189:8189/udp"
      - "8189:8189/tcp"
      - "9997:9997/tcp"
      - "9998:9998/tcp"

  session-api:
    build:
      context: ./session-api
    container_name: avatar-session-api
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - avatar-net
    environment:
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_WEBRTC_BASE_URL: ${MEDIAMTX_WEBRTC_BASE_URL:-http://localhost:8889}
      WHIP_USERNAME: ${WHIP_USERNAME:-publisher}
      WHEP_USERNAME: ${WHEP_USERNAME:-viewer}
      MEDIAMTX_TOKEN_TTL: ${MEDIAMTX_TOKEN_TTL:-1h}
      INTERNAL_AUTH_ALLOWED_IPS: ${INTERNAL_AUTH_ALLOWED_IPS:-}
      # SESSION_TTL: 24h
    ports:
      - "8080:8080"

volumes:
  redis-data:
