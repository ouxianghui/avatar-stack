logLevel: info

api: yes
apiAddress: :9997

metrics: yes
metricsAddress: :9998

# Current default uses internal static credentials for easy local startup.
# For production, switch to authMethod: http and delegate policy to session-api.
authMethod: internal
# authMethod: http
# authHTTPAddress: http://session-api:8080/internal/mediamtx/auth
authInternalUsers:
  - user: any
    pass: ""
    ips: []
    permissions:
      - action: api
      - action: metrics

  - user: publisher
    pass: publisher-pass
    permissions:
      - action: publish
        # Quote: bare "~" is YAML null; tilde-prefix regex must be a string.
        path: "~^avatar/[^/]+/in$"

  - user: viewer
    pass: viewer-pass
    permissions:
      - action: read
        path: "~^avatar/[^/]+/out$"

  - user: worker
    pass: worker-pass
    permissions:
      - action: read
        path: "~^avatar/[^/]+/in$"
      - action: publish
        path: "~^avatar/[^/]+/out$"

  - user: api
    pass: api-pass
    ips: []
    permissions:
      - action: api
      - action: metrics

webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcAllowOrigin: '*'
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcAdditionalHosts: [localhost]
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
  - url: turn:localhost:3478?transport=udp
    username: AUTH_SECRET
    password: turn-shared-secret
    clientOnly: true
  - url: turn:localhost:3478?transport=tcp
    username: AUTH_SECRET
    password: turn-shared-secret
    clientOnly: true

rtsp: yes
rtspAddress: :8554
rtspAuthMethods: [basic]
rtspTransports: [tcp, udp]

# Apply pathDefaults to any path not matched elsewhere (matches upstream default layout).
paths:
  all_others: {}

pathDefaults:
  source: publisher
  sourceOnDemand: no
  # Notify session-api (MediaMTX expands $MTX_PATH before exec). Requires an image with curl (see mediamtx/Dockerfile).
  # Avoid curl -f: HTTP errors should not make the hook command exit non-zero.
  runOnReady: curl -sS -X POST "http://session-api:8080/internal/mediamtx/hooks/on-ready?path=$MTX_PATH"
  runOnNotReady: curl -sS -X POST "http://session-api:8080/internal/mediamtx/hooks/on-not-ready?path=$MTX_PATH"
  runOnRead: curl -sS -X POST "http://session-api:8080/internal/mediamtx/hooks/on-read?path=$MTX_PATH"
  runOnUnread: curl -sS -X POST "http://session-api:8080/internal/mediamtx/hooks/on-unread?path=$MTX_PATH"
