<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHEP Test Player</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .row { margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
    label { min-width: 120px; }
    input[type="text"], input[type="password"] { width: 520px; max-width: 90vw; }
    button { padding: 6px 12px; }
    video { width: min(960px, 90vw); background: #111; margin-top: 12px; }
    pre { background: #f4f4f4; padding: 10px; max-width: min(960px, 90vw); overflow: auto; }
  </style>
</head>
<body>
  <h2>MediaMTX WHEP Test</h2>
  <p style="color:#444;font-size:14px;max-width:min(960px,90vw);line-height:1.45">
    Use <strong>http://localhost:…</strong> (e.g. <code>python3 -m http.server</code> in this folder), not <code>file://</code>.
    <code>POST /sessions</code>, then <strong>WHIP</strong> <code>…/avatar/&lt;id&gt;/in/whip</code> (same <code>id</code> as here), then <strong>WHEP</strong> <code>…/out/whep</code> — otherwise MediaMTX may return <code>404</code> on <code>/out</code>.
    <code>?session=&lt;uuid&gt;</code> pre-fills the WHEP URL and the WHIP hint below.
  </p>
  <p id="whipHint" style="display:none;color:#064;font-size:14px;max-width:min(960px,90vw);word-break:break-all"></p>

  <div class="row">
    <label for="sessionId">Session ID</label>
    <input id="sessionId" type="text" value="" placeholder="cf42e341-70a6-4dc2-a365-1697e69641c3" />
  </div>
  <div class="row">
    <label for="url">WHEP URL</label>
    <input id="url" type="text" value="" placeholder="http://localhost:8889/avatar/&lt;session_id&gt;/out/whep" />
  </div>
  <div class="row">
    <label for="user">Username</label>
    <input id="user" type="text" value="viewer" />
  </div>
  <div class="row">
    <label for="pass">Password</label>
    <input id="pass" type="password" value="viewer-pass" />
  </div>
  <div class="row">
    <button id="start">Start WHEP</button>
    <button id="stop" disabled>Stop</button>
  </div>

  <video id="video" autoplay playsinline controls></video>
  <pre id="log"></pre>

  <script>
    const $ = (id) => document.getElementById(id);
    const logEl = $("log");
    const videoEl = $("video");
    const startBtn = $("start");
    const stopBtn = $("stop");

    let pc = null;
    let sessionUrl = null;
    let stopping = false;
    let disconnectTimer = null;

    function log(msg) {
      const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.textContent += `${line}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(line);
    }

    function basicAuthHeader(user, pass) {
      if (!user && !pass) return null;
      return `Basic ${btoa(`${user}:${pass}`)}`;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function normalizeSid(s) {
      return String(s || "").trim();
    }

    function sidLooksUuid(sid) {
      return /^[0-9a-f-]{36}$/i.test(sid);
    }

    function buildWhepUrlFromSid(sid) {
      return `http://localhost:8889/avatar/${sid}/out/whep`;
    }

    function parseSessionIdFromWhepUrl(whepUrl) {
      try {
        const u = new URL(whepUrl);
        const m = u.pathname.match(/\/avatar\/([0-9a-f-]{36})\/out\/whep\/?$/i);
        return m ? m[1] : null;
      } catch {
        return null;
      }
    }

    function formatNoStreamHelp(whepUrl, errText) {
      const sid = parseSessionIdFromWhepUrl(whepUrl);
      const whip = sid
        ? `WHIP first (same session): http://localhost:8889/avatar/${sid}/in/whip`
        : "WHIP first: http://localhost:8889/avatar/<session_id>/in/whip (id must match this WHEP URL).";
      return (
        `${errText}\n\n` +
        `${whip}\n` +
        "/out is published by the stack worker after /in is live; if WHIP is up, check worker and mediamtx logs."
      );
    }

    function updateWhipHintFromUrl() {
      const hint = $("whipHint");
      const sidInput = normalizeSid($("sessionId").value);
      const sid = sidLooksUuid(sidInput) ? sidInput : parseSessionIdFromWhepUrl($("url").value.trim());
      if (!sid) {
        hint.style.display = "none";
        hint.textContent = "";
        return;
      }
      hint.style.display = "block";
      hint.innerHTML =
        `<strong>WHIP (before WHEP):</strong> <code>http://localhost:8889/avatar/${sid}/in/whip</code>`;
    }

    function syncUrlFromSession() {
      const sid = normalizeSid($("sessionId").value);
      if (!sidLooksUuid(sid)) return;
      $("url").value = buildWhepUrlFromSid(sid);
      updateWhipHintFromUrl();
    }

    function syncSessionFromUrl() {
      const sid = parseSessionIdFromWhepUrl($("url").value.trim());
      if (sid) {
        $("sessionId").value = sid;
      }
      updateWhipHintFromUrl();
    }

    async function start() {
      if (pc) {
        log("Already running.");
        return;
      }

      let whepUrl = $("url").value.trim();
      const user = $("user").value;
      const pass = $("pass").value;
      const auth = basicAuthHeader(user, pass);

      if (!whepUrl) {
        const sid = normalizeSid($("sessionId").value);
        if (sidLooksUuid(sid)) {
          whepUrl = buildWhepUrlFromSid(sid);
          $("url").value = whepUrl;
        } else {
          log("Session ID or WHEP URL is required.");
          return;
        }
      }

      // Default to audible playback; user can still mute via native controls.
      videoEl.muted = false;
      videoEl.volume = 1.0;

      pc = new RTCPeerConnection();
      pc.addTransceiver("video", { direction: "recvonly" });
      pc.addTransceiver("audio", { direction: "recvonly" });

      pc.oniceconnectionstatechange = () => log(`ICE state: ${pc.iceConnectionState}`);
      pc.onconnectionstatechange = async () => {
        const st = pc ? pc.connectionState : "closed";
        log(`PC state: ${st}`);
        if (st === "connected") {
          if (disconnectTimer) {
            clearTimeout(disconnectTimer);
            disconnectTimer = null;
          }
          return;
        }
        // 'disconnected' can be transient; give ICE some time to recover.
        if (!stopping && st === "disconnected") {
          if (disconnectTimer) return;
          log("PC disconnected, waiting 15s for recovery...");
          disconnectTimer = setTimeout(async () => {
            disconnectTimer = null;
            if (!pc || stopping) return;
            if (pc.connectionState === "disconnected") {
              log("PC stayed disconnected for 15s, cleaning up local WHEP session.");
              await stop();
            }
          }, 15000);
          return;
        }
        if (disconnectTimer) {
          clearTimeout(disconnectTimer);
          disconnectTimer = null;
        }
        // failed/closed are terminal for this session
        if (!stopping && (st === "failed" || st === "closed")) {
          log("PC entered terminal state, cleaning up local WHEP session.");
          await stop();
        }
      };

      pc.ontrack = (ev) => {
        if (!videoEl.srcObject) {
          videoEl.srcObject = new MediaStream();
        }
        videoEl.srcObject.addTrack(ev.track);
        log(`Track received: kind=${ev.track.kind}`);
        videoEl.play().catch((err) => log(`play() warning: ${err.message}`));
      };

      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const headers = { "Content-Type": "application/sdp" };
        if (auth) headers["Authorization"] = auth;
        const retryUntil = Date.now() + 120000; // SoulX first-frame can be slow; retry for up to 2 minutes.
        let res;
        while (true) {
          res = await fetch(whepUrl, {
            method: "POST",
            headers,
            body: offer.sdp,
          });

          if (res.ok) break;

          const body = await res.text();
          const noOutYet =
            res.status === 404 &&
            /no stream is available on path/i.test(body) &&
            /\/out/.test(body);

          if (noOutYet && Date.now() < retryUntil) {
            log("No /out stream yet, retrying WHEP in 2s...");
            await sleep(2000);
            continue;
          }

          let msg = `WHEP POST failed ${res.status}: ${body}`;
          if (noOutYet) {
            msg = formatNoStreamHelp(whepUrl, msg);
          }
          throw new Error(msg);
        }

        const location = res.headers.get("Location");
        sessionUrl = location ? new URL(location, whepUrl).toString() : null;
        if (sessionUrl) log(`WHEP session: ${sessionUrl}`);

        const answerSdp = await res.text();
        await pc.setRemoteDescription({ type: "answer", sdp: answerSdp });
        log("WHEP connected.");

        startBtn.disabled = true;
        stopBtn.disabled = false;
      } catch (err) {
        log(`Start error: ${err.message}`);
        await stop();
      }
    }

    async function stop() {
      if (stopping) return;
      stopping = true;
      try {
        if (disconnectTimer) {
          clearTimeout(disconnectTimer);
          disconnectTimer = null;
        }
        if (pc) {
          pc.close();
          pc = null;
        }

        if (videoEl.srcObject) {
          for (const t of videoEl.srcObject.getTracks()) t.stop();
          videoEl.srcObject = null;
        }

        const user = $("user").value;
        const pass = $("pass").value;
        const auth = basicAuthHeader(user, pass);
        if (sessionUrl) {
          try {
            const headers = {};
            if (auth) headers["Authorization"] = auth;
            await fetch(sessionUrl, { method: "DELETE", headers });
            log("WHEP session deleted.");
          } catch (err) {
            log(`Session delete warning: ${err.message}`);
          }
        }

        sessionUrl = null;
        startBtn.disabled = false;
        stopBtn.disabled = true;
      } finally {
        stopping = false;
      }
    }

    startBtn.addEventListener("click", start);
    stopBtn.addEventListener("click", stop);
    $("sessionId").addEventListener("input", syncUrlFromSession);
    $("url").addEventListener("input", syncSessionFromUrl);
    window.addEventListener("beforeunload", () => { if (pc || sessionUrl) stop(); });

    (function applySessionQuery() {
      const sid = new URLSearchParams(location.search).get("session");
      if (!sid || !/^[0-9a-f-]{36}$/i.test(sid.trim())) return;
      const id = sid.trim();
      if (!$("sessionId").value.trim()) {
        $("sessionId").value = id;
      }
      if (!$("url").value.trim()) {
        $("url").value = buildWhepUrlFromSid(id);
      }
      updateWhipHintFromUrl();
    })();
  </script>
</body>
</html>
